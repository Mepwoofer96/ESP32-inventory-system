<!DOCTYPE html>
<html lang="en">
<head>
  <title>Inventory — Light it Up LLC</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

  <div class="topbar">
    <span class="topbar-brand">Light it Up &nbsp;· &nbsp;Inventory</span>
    <nav class="topbar-nav">
      <a class="nav-btn active" href="/">Index</a>
      <a class="nav-btn" href="/admin">Admin</a>
    </nav>
  </div>

  <div class="page">
    <h1>Parts <span>List</span></h1>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Part Name</th>
            <th>Stock</th>
            <th>Data Sheet</th>
          </tr>
        </thead>
        <tbody id="productTable">
          %PART_LIST%
        </tbody>
      </table>
    </div>
  </div>

  <script>
  const params = new URLSearchParams(window.location.search);
  const status = params.get("status");
  if(status === "success"){
    showToast("Part added successfully", "success");
  } else if(status === "error"){
    showToast("Something went wrong — try again", "error");
  }

  function showToast(message, type){
    const toast = document.createElement("div");
    toast.textContent = message;
    toast.style.cssText = `
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: ${type === "success" ? "#4f8ef7" : "#e05c5c"};
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 0.85rem;
      z-index: 999;
      opacity: 1;
      transition: opacity 0.5s;
    `;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity = "0"; }, 2500);
    setTimeout(() => { toast.remove(); }, 3000);
  }
</script>

</body>
</html>
