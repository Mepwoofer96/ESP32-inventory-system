<!DOCTYPE html>
<html lang="en">
<head>
  <title>NFC — Inventory</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" type="text/css" href="style.css">
    <style>
    body { visibility: hidden; background: #0d0d0d; margin: 0; }
  </style>
  
  <!-- Reveal the page once CSS is loaded -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.body.style.visibility = 'visible';
    });
  </script>
</head>
<body>
    <div class="topbar">
    <span class="topbar-brand">// Light it Up &nbsp;· &nbsp;Inventory</span>
    <nav class="topbar-nav">
    </nav>
  </div>

  <div class="page">
    <h1>NFC <span>Panel</span></h1>
<div class="form-card">
  <h1>Tap phone to NFC tag</h1>
  <p id="status">Hold your phone near the tag...</p>
  <button class="btn btn-primary" onclick="window.location.href='/admin'">Done / Back to Admin</button>

  <script>
    document.body.style.visibility = 'visible';

    const partName = "%PART_NAME%";
    const tagUrl = window.location.origin + "/part?name=" + encodeURIComponent(partName);

    async function writeTag() {
      const statusEl = document.getElementById('status');
      if (!('NDEFReader' in window)) {
        statusEl.innerText = "Web NFC not supported. Use Chrome on Android.";
        return;
      }
      try {
        const ndef = new NDEFReader();
        await ndef.write({ records: [{ recordType: "url", data: tagUrl }] });
        statusEl.innerText = "Tag written successfully!";
      } catch (err) {
        statusEl.innerText = "Error writing tag: " + err;
      }
    }

    writeTag();
  </script>

</div>
<div class="form-card">
  <h2>If unable to write NFC from phone</h2>
  <form action="/internalnfc" method="POST">
    <div class="field">
      <button class="btn btn-primary" type="submit">Write from Onboard NFC</button>
    </div>
  </form>
</div>
</body>
</html>
