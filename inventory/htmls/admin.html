<!DOCTYPE html>
<html lang="en">
<head>
  <title>Admin — Inventory</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" type="text/css" href="style.css">
    <style>
    body { visibility: hidden; background: #0d0d0d; margin: 0; }
  </style>
  
  <!-- Reveal the page once CSS is loaded -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.body.style.visibility = 'visible';
    });
  </script>
</head>
<body>

  <div class="topbar">
    <span class="topbar-brand">// Light it Up &nbsp;· &nbsp;Inventory</span>
    <nav class="topbar-nav">
      <a class="nav-btn" href="/">Index</a>
      <a class="nav-btn active" href="/admin">Admin</a>
    </nav>
  </div>

  <div class="page">
    <h1>Admin <span>Panel</span></h1>

    <!-- Add Part -->
    <div class="form-card">
      <h2>Add New Part</h2>
      <form action="/addpart" method="POST" enctype="multipart/form-data">
        <div class="field">
          <label>Part Name</label>
          <input type="text" name="name" placeholder="e.g. 10k Resistor">
        </div>
        <div class="field">
          <label>Stock Count</label>
          <input type="number" name="count" placeholder="e.g. 47">
        </div>
        <div class="field">
          <label>PDF Data Sheet</label>
          <input type="file" name="pdf" accept=".pdf">
        </div>
        <div class="field">
          <label>Photo</label>
          <input type="file" name="photo" accept=".jpg,.jpeg">
        </div>
        <button class="btn btn-primary" type="submit">Add Part</button>
      </form>
    </div>

    <!-- Delete Part -->
    <div class="form-card">
      <h2>Remove Part</h2>
      <form action="/deletepart" method="POST">
        <div class="field">
          <label>Part Name</label>
          <input type="text" name="name" placeholder="Exact part name to delete">
        </div>
        <button class="btn btn-danger" type="submit">Delete Part</button>
      </form>
    </div>
<div class="form-card">
  <h2>WiFi Settings</h2>
  <form action="/setwifi" method="POST">
    <div class="field">
      <label>SSID</label>
      <input type="text" name="ssid" placeholder="Network name">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Password">
    </div>
    <button class="btn btn-primary" type="submit">Connect to WiFi</button>
  </form>
  <form action="/setap" method="POST" style="margin-top: 1rem;">
    <button class="btn btn-primary" type="submit">Switch to AP Mode</button>
  </form>
</div>

<div class="form-card">
  <h2>Inventory Output PDF</h2>
  <form action="/printpdf" method="GET">
    <div class="field">
      <button class="btn btn-primary" type="submit">Get PDF</button>
    </div>
  </form>
</div>

<div class="form-card">
  <h2>Alert Threshold</h2>
  <form action="/altertthresh" method="POST">
    <div class="field">
<input type="number" name="Threshold number">  

        <button class="btn btn-danger" type="submit">Apply Threshold</button>

</div>  
</form>
</div>

<div class="form-card">
  <h2>Password Protect Changing Inventory Value</h2>
  <h3> THIS WILL ALTER IMPORTANT THINGS</h3>
  <form action="/invval" method="POST">
    <div class="field">
      <button class="btn btn-danger" type="submit">Enable</button>
      <button class="btn btn-primary" type="submit">Disable</button>
    </div>
  </form>
</div>

<div class="form-card">
  <h2>Change Admin Settings</h2>
  <form action="/setadmin" method="POST">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Password">
    </div>
    <button class="btn btn-danger" type="submit">Change Admin Settings</button>
  </form>
</div>

<div class="form-card">
  <h2>Check For Update</h2>
  <div id="offline-warning" class="warning-box" style="display:none; margin-bottom: 0.75rem;">
    Connect to the internet first
  </div>
  <form action="/checkupdate" method="GET">
    <div class="field">
      <button id="update-btn" class="btn btn-danger" type="submit" disabled>Check For Update</button>
    </div>
  </form>
</div>

<script>
async function checkWifiStatus() {
  const btn = document.getElementById('update-btn');
  const warning = document.getElementById('offline-warning');
  try {
    const res = await fetch('/wifistatus');
    const status = await res.text();
    if (status === 'online') {
      btn.classList.remove('btn-danger');
      btn.classList.add('btn-primary');
      btn.disabled = false;
      warning.style.display = 'none';
    } else {
      btn.classList.remove('btn-primary');
      btn.classList.add('btn-danger');
      btn.disabled = true;
      warning.style.display = 'block';
    }
  } catch (e) {
    // request itself failed — treat as offline
    btn.classList.remove('btn-primary');
    btn.classList.add('btn-danger');
    btn.disabled = true;
    warning.style.display = 'block';
  }
}

checkWifiStatus();
setInterval(checkWifiStatus, 5000); // recheck every 5 seconds
</script>


  </div>  
</body>
</html>
