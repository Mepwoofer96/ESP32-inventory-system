<!DOCTYPE html>
<html lang="en">
<head>
  <title>%PART_NAME% — Inventory</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

  <div class="topbar">
    <span class="topbar-brand">// Light it Up &nbsp;· &nbsp;Inventory</span>
    <nav class="topbar-nav">
      <a class="nav-btn" href="/">Index</a>
      <a class="nav-btn" href="/admin">Admin</a>
    </nav>
  </div>

  <div class="page">
    <h1>Part <span>Detail</span></h1>

    <!-- Main info card -->
    <div class="part-card">
      <div class="part-photo">
        <img src="%PART_PHOTO%" alt="%PART_NAME%" onerror="this.parentElement.innerHTML='<span class=no-photo>No photo available</span>'">
      </div>
      <div class="part-info">
        <div class="part-name">%PART_NAME%</div>
        <div class="part-meta">
          <div class="meta-row">
            <span class="meta-label">Stock</span>
            <span class="meta-value stock" id="stockBadge">%PART_COUNT%</span>
          </div>
        </div>
        <a class="pdf-link" href="%PART_PDF%" target="_blank">
          ↗ View Data Sheet
        </a>
      </div>
    </div>

<!-- Counter card -->
  <div class="part-card" style="margin-top: 1.5rem; display: block; padding: 1.5rem;">
    <h2 style="font-family: var(--mono); font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem;">Update Stock</h2>
<div class="counter">
    <button class="btn btn-primary" onclick="decrement()">−</button>
    <input type="number" id="count" value="%PART_COUNT%" oninput="onType()" style="width: 80px; text-align: center; font-family: var(--mono); font-size: 1.2rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 0.4rem;">
    <button class="btn btn-primary" onclick="increment()">+</button>
</div>
<button class="btn btn-primary" onclick="submitCount()" style="margin-top: 1rem;">Update Stock</button>
  </div>

  
  

  </div>

  <script type="text/javascript">
let count = %PART_COUNT%;
let saveTimer;

function updateDisplay(){
    document.getElementById("count").value = count;
    document.getElementById("stockBadge").textContent = count;
}

function increment(){
    count++;
    updateDisplay();
    saveCount();
}

function decrement(){
    if(count > 0) count--;
    updateDisplay();
    saveCount();
}

function onType(){
    let typed = parseInt(document.getElementById("count").value);
    if(!isNaN(typed) && typed >= 0){
        count = typed;
        document.getElementById("stockBadge").textContent = count;
        saveCount();
    }
}

function submitCount(){
    clearTimeout(saveTimer);
    fetch('/updatecount', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'name=%PART_NAME%&count=' + count
    }).then(() => {
        document.getElementById("stockBadge").textContent = count;
    });
}

function saveCount(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
        fetch('/updatecount', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'name=%PART_NAME%&count=' + count
        });
    }, 500);
}
  </script>

</body>
</html>
